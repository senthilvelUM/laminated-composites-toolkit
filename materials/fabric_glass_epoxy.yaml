# Representative properties of a woven fabric-reinforced glass/epoxy composite.
# All values in SI units: Pa for moduli and strengths, kg/m^3 for density.
# Directions 1 and 2 are the principal material directions (warp and fill).
# Ply thickness is not a material property — it is specified per ply in create_ply().

name: Fabric Glass/Epoxy
type: fabric

# Physical properties
rho: 1900.0       # density [kg/m^3]

# Elastic properties
E1:    24.5e9     # Young's modulus in the 1-direction [Pa]
E2:    23.8e9     # Young's modulus in the 2-direction [Pa]
nu12:   0.11      # major Poisson's ratio [-]
G12:    4.7e9     # in-plane shear modulus [Pa]
G13:    3.0e9     # transverse shear modulus in the 1-3 plane [Pa]  (matrix-dominated)
G23:    3.0e9     # transverse shear modulus in the 2-3 plane [Pa]  (matrix-dominated)

# Strength properties
F1t:  963.0e6     # tensile strength in the 1-direction [Pa]
F1c:  900.0e6     # compressive strength in the 1-direction [Pa]
F2t:  856.0e6     # tensile strength in the 2-direction [Pa]
F2c:  900.0e6     # compressive strength in the 2-direction [Pa]
F6:    71.0e6     # in-plane shear strength in the 1-2 plane [Pa]
