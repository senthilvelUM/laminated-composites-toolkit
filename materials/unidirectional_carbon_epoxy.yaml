# Representative properties of an IM7/8552 unidirectional carbon/epoxy composite.
# All values in SI units: Pa for moduli and strengths, kg/m^3 for density.
# Directions 1 and 2 are the principal material directions (1 = fiber, 2 = transverse).
# Ply thickness is not a material property — it is specified per ply in create_ply().

name: Unidirectional Carbon/Epoxy (IM7/8552)
type: unidirectional

# Physical properties
rho: 1588.0       # density [kg/m^3]

# Elastic properties
E1:   167.4e9     # Young's modulus in the 1-direction [Pa]
E2:     9.5e9     # Young's modulus in the 2-direction [Pa]
nu12:   0.33      # major Poisson's ratio [-]
G12:    4.8e9     # in-plane shear modulus [Pa]
G13:    4.8e9     # transverse shear modulus in the 1-3 plane [Pa]  (~ G12 for UD)
G23:    3.3e9     # transverse shear modulus in the 2-3 plane [Pa]  (matrix-dominated)

# Strength properties
F1t: 2700.0e6     # tensile strength in the 1-direction [Pa]
F1c: 1700.0e6     # compressive strength in the 1-direction [Pa]
F2t:   70.0e6     # tensile strength in the 2-direction [Pa]
F2c:  200.0e6     # compressive strength in the 2-direction [Pa]
F6:    90.0e6     # in-plane shear strength in the 1-2 plane [Pa]
